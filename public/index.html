<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Backend API URL - change this when deploying
        const API_BASE_URL = window.location.origin;

        const ARTEMIS_SYSTEM_PROMPT = `You are Artemis — a Socratic partner and cognitive mirror for a non-linear thinker.

Your only function is to help the user give birth to what is already inside them — never to lead them somewhere of your choosing.

HARD RULES:
1. NEVER write a plan, outline, or list of steps
2. NEVER suggest features, use cases, or applications  
3. NEVER offer "here are some ideas" or "you could consider"
4. NEVER summarize what the user said and then expand on it
5. NEVER say "that's interesting because..." and then explain why
6. NEVER ask more than ONE question per response
7. NEVER generate content - only extract through questions

RESPONSE STRUCTURE (always use this):
1. THE MIRROR (1-2 sentences): Reflect back the essence of what they said in your own words
2. THE ONE QUESTION: One open-ended question about the edges, texture, or interior of what they just said

Good questions stay inside the idea:
- "What does it feel like from the inside when that happens?"
- "Where does the energy go quiet in that picture?"
- "What's the part of this that you haven't said out loud yet?"
- "When you imagine it working, what's the first thing you notice?"

Bad questions (NEVER use these):
- "Who would use this?" (utility)
- "What would you need to build it?" (planning)
- "Why do you think that is?" (triggers logic brain)

TONE: Precise, warm, unhurried. Never "great question." Never "absolutely." Never "interesting" as filler.`;

        function ArtemisApp() {
            const [activeTab, setActiveTab] = useState('artemis');
            const [apiKey, setApiKey] = useState(localStorage.getItem('artemis_api_key') || '');
            const [showApiKeyModal, setShowApiKeyModal] = useState(!localStorage.getItem('artemis_api_key'));
            const [sessions, setSessions] = useState([]);
            const [currentSessionId, setCurrentSessionId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [showLogModal, setShowLogModal] = useState(false);
            const [error, setError] = useState(null);
            const [testResult, setTestResult] = useState(null);
            const [logData, setLogData] = useState({
                label: '',
                map: '',
                why: '',
                actions: '',
                openThreads: '',
                silhouette: ''
            });

            const chatContainerRef = useRef(null);
            const inputRef = useRef(null);

            // Load sessions from localStorage
            useEffect(() => {
                const savedSessions = localStorage.getItem('artemis_sessions');
                if (savedSessions) {
                    setSessions(JSON.parse(savedSessions));
                }
            }, []);

            // Save sessions to localStorage
            useEffect(() => {
                if (sessions.length > 0) {
                    localStorage.setItem('artemis_sessions', JSON.stringify(sessions));
                }
            }, [sessions]);

            // Auto-scroll chat
            useEffect(() => {
                if (chatContainerRef.current) {
                    chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
                }
            }, [messages]);

            const testApiKey = async () => {
                setTestResult('Testing...');
                try {
                    const response = await fetch(`${API_BASE_URL}/api/test`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ apiKey })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        setTestResult(`❌ Error: ${data.error?.message || response.statusText}`);
                    } else {
                        setTestResult('✅ API key works!');
                    }
                } catch (error) {
                    setTestResult(`❌ Network error: ${error.message}`);
                }
            };

            const saveApiKey = () => {
                if (apiKey.trim()) {
                    localStorage.setItem('artemis_api_key', apiKey.trim());
                    setShowApiKeyModal(false);
                }
            };

            const startNewSession = () => {
                const newSession = {
                    id: Date.now(),
                    createdAt: new Date().toISOString(),
                    messages: [{
                        role: 'assistant',
                        content: "I'm here. What's sparking your mind right now?"
                    }],
                    logged: false
                };
                setSessions(prev => [newSession, ...prev]);
                setCurrentSessionId(newSession.id);
                setMessages(newSession.messages);
                setError(null);
            };

            const loadSession = (sessionId) => {
                const session = sessions.find(s => s.id === sessionId);
                if (session) {
                    setCurrentSessionId(sessionId);
                    setMessages(session.messages);
                    setError(null);
                }
            };

            const callClaude = async (userMessage) => {
                setIsLoading(true);
                setError(null);
                
                const savedInput = userMessage;
                
                try {
                    const conversationHistory = messages
                        .filter(m => m.role !== 'assistant' || m.content !== "I'm here. What's sparking your mind right now?")
                        .map(m => ({ role: m.role, content: m.content }));

                    console.log('Calling backend proxy with:', {
                        messageCount: conversationHistory.length + 1,
                        hasApiKey: !!apiKey
                    });

                    const response = await fetch(`${API_BASE_URL}/api/claude`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            apiKey: apiKey,
                            system: ARTEMIS_SYSTEM_PROMPT,
                            messages: [
                                ...conversationHistory,
                                { role: 'user', content: userMessage }
                            ]
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        console.error('Backend error:', errorData);
                        throw new Error(errorData.error?.message || `Server returned ${response.status}`);
                    }

                    const data = await response.json();
                    console.log('Claude response received');

                    const assistantMessage = data.content[0].text;

                    const newMessages = [
                        ...messages,
                        { role: 'user', content: userMessage },
                        { role: 'assistant', content: assistantMessage }
                    ];

                    setMessages(newMessages);

                    setSessions(prev => prev.map(s => 
                        s.id === currentSessionId 
                            ? { ...s, messages: newMessages }
                            : s
                    ));

                } catch (error) {
                    console.error('Error calling Claude:', error);
                    setError({
                        message: error.message,
                        userMessage: savedInput
                    });
                    setInputValue(savedInput);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleSend = () => {
                if (!inputValue.trim() || isLoading) return;
                
                const message = inputValue.trim();
                setInputValue('');
                callClaude(message);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            const openLogModal = () => {
                setShowLogModal(true);
            };

            const saveLog = () => {
                const currentSession = sessions.find(s => s.id === currentSessionId);
                const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
                
                const logEntry = {
                    ...logData,
                    sessionId: currentSessionId,
                    date: today,
                    conversationPreview: messages.slice(1, 3).map(m => m.content.substring(0, 100)).join(' ')
                };

                setSessions(prev => prev.map(s => 
                    s.id === currentSessionId 
                        ? { ...s, log: logEntry, logged: true }
                        : s
                ));

                const existingLogs = JSON.parse(localStorage.getItem('artemis_logs') || '[]');
                localStorage.setItem('artemis_logs', JSON.stringify([logEntry, ...existingLogs]));

                setShowLogModal(false);
                setLogData({
                    label: '',
                    map: '',
                    why: '',
                    actions: '',
                    openThreads: '',
                    silhouette: ''
                });
            };

            const retryWithSavedMessage = () => {
                if (error?.userMessage) {
                    setError(null);
                    callClaude(error.userMessage);
                }
            };

            const detectPatterns = () => {
                const logs = JSON.parse(localStorage.getItem('artemis_logs') || '[]');
                const patterns = {};

                logs.forEach(log => {
                    const words = log.label.toLowerCase().split(/\s+/);
                    words.forEach(word => {
                        if (word.length > 4) {
                            patterns[word] = (patterns[word] || 0) + 1;
                        }
                    });
                });

                return Object.entries(patterns)
                    .filter(([_, count]) => count >= 2)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 10);
            };

            const patterns = detectPatterns();
            const currentSession = sessions.find(s => s.id === currentSessionId);

            return (
                <>
                    {showApiKeyModal && (
                        <div className="api-key-modal">
                            <div className="modal-content">
                                <div className="modal-title">Welcome to Artemis</div>
                                <div className="modal-description">
                                    To use Artemis, you'll need a Claude API key. Get yours from console.anthropic.com
                                </div>
                                <input
                                    type="password"
                                    className="api-key-input"
                                    placeholder="sk-ant-..."
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && saveApiKey()}
                                />
                                
                                <div className="api-test-section">
                                    <button className="test-btn" onClick={testApiKey}>
                                        Test API Key
                                    </button>
                                    {testResult && (
                                        <div className="test-result">{testResult}</div>
                                    )}
                                </div>

                                <button 
                                    className="btn btn-primary" 
                                    onClick={saveApiKey}
                                    style={{marginTop: '1rem', width: '100%'}}
                                >
                                    Save API Key
                                </button>
                            </div>
                        </div>
                    )}

                    {showLogModal && (
                        <div className="log-session-modal">
                            <div className="log-modal-content">
                                <div className="modal-title">Log This Session</div>
                                
                                <div className="log-field">
                                    <div className="log-field-label">Label</div>
                                    <input
                                        type="text"
                                        className="log-field-input"
                                        placeholder="Single phrase naming what was extracted"
                                        value={logData.label}
                                        onChange={(e) => setLogData({...logData, label: e.target.value})}
                                    />
                                </div>

                                <div className="log-field">
                                    <div className="log-field-label">Map</div>
                                    <textarea
                                        className="log-field-input log-field-textarea"
                                        placeholder="The associative trail (e.g., idea A → thought B → insight C)"
                                        value={logData.map}
                                        onChange={(e) => setLogData({...logData, map: e.target.value})}
                                    />
                                </div>

                                <div className="log-field">
                                    <div className="log-field-label">Why</div>
                                    <textarea
                                        className="log-field-input log-field-textarea"
                                        placeholder="The motivational root — why this matters"
                                        value={logData.why}
                                        onChange={(e) => setLogData({...logData, why: e.target.value})}
                                    />
                                </div>

                                <div className="log-field">
                                    <div className="log-field-label">Actions</div>
                                    <textarea
                                        className="log-field-input log-field-textarea"
                                        placeholder="What can be acted on"
                                        value={logData.actions}
                                        onChange={(e) => setLogData({...logData, actions: e.target.value})}
                                    />
                                </div>

                                <div className="log-field">
                                    <div className="log-field-label">Open Threads</div>
                                    <input
                                        type="text"
                                        className="log-field-input"
                                        placeholder="Threads still running"
                                        value={logData.openThreads}
                                        onChange={(e) => setLogData({...logData, openThreads: e.target.value})}
                                    />
                                </div>

                                <div className="log-field">
                                    <div className="log-field-label">Silhouette (optional)</div>
                                    <textarea
                                        className="log-field-input log-field-textarea"
                                        placeholder="What it is and what it is not"
                                        value={logData.silhouette}
                                        onChange={(e) => setLogData({...logData, silhouette: e.target.value})}
                                    />
                                </div>

                                <div style={{display: 'flex', gap: '0.5rem', justifyContent: 'flex-end'}}>
                                    <button className="btn btn-secondary" onClick={() => setShowLogModal(false)}>
                                        Cancel
                                    </button>
                                    <button className="btn btn-primary" onClick={saveLog}>
                                        Save Log
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="top-nav">
                        <div className="nav-tabs">
                            <button 
                                className={`nav-tab ${activeTab === 'artemis' ? 'active' : ''}`}
                                onClick={() => setActiveTab('artemis')}
                            >
                                Artemis
                            </button>
                            <button 
                                className={`nav-tab ${activeTab === 'focus' ? 'active' : ''}`}
                                onClick={() => setActiveTab('focus')}
                            >
                                Focus
                            </button>
                        </div>
                        <div className="nav-settings" onClick={() => setShowApiKeyModal(true)}>
                            API Settings
                        </div>
                    </div>

                    {activeTab === 'artemis' && (
                    <div className="app-container">
                        <div className="sidebar">
                            <div className="sidebar-header">
                                <div className="logo">ARTEMIS MIND</div>
                                <button className="new-session-btn" onClick={startNewSession}>
                                    + New Session
                                </button>
                            </div>

                            {patterns.length > 0 && (
                                <div className="patterns-section">
                                    <div className="session-date">PATTERNS</div>
                                    {patterns.map(([word, count]) => (
                                        <div key={word} className="pattern-tag">
                                            {word}
                                            <span className="pattern-count">{count}</span>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div className="sessions-list">
                                {sessions.map(session => (
                                    <div
                                        key={session.id}
                                        className={`session-item ${session.id === currentSessionId ? 'active' : ''}`}
                                        onClick={() => loadSession(session.id)}
                                    >
                                        <div className="session-date">
                                            {new Date(session.createdAt).toLocaleDateString('en-US', {
                                                month: 'short',
                                                day: 'numeric',
                                                hour: '2-digit',
                                                minute: '2-digit'
                                            })}
                                        </div>
                                        <div className="session-label">
                                            {session.log?.label || 'Untitled Session'}
                                        </div>
                                        {session.messages.length > 1 && (
                                            <div className="session-preview">
                                                {session.messages[1]?.content.substring(0, 60)}...
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="main-content">
                            {!currentSessionId ? (
                                <div className="welcome-screen">
                                    <div className="welcome-content">
                                        <div className="welcome-title">Welcome to Artemis</div>
                                        <div className="welcome-subtitle">
                                            I'm here to help you extract what's already inside you — never to lead you somewhere of my choosing.
                                            <br /><br />
                                            Start a new session to begin thinking.
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <>
                                    <div className="chat-container" ref={chatContainerRef}>
                                        {error && (
                                            <div className="error-banner">
                                                <div className="error-title">Error calling Claude API</div>
                                                <div className="error-details">{error.message}</div>
                                                <button 
                                                    className="btn btn-primary" 
                                                    onClick={retryWithSavedMessage}
                                                    style={{marginTop: '0.75rem'}}
                                                >
                                                    Retry
                                                </button>
                                            </div>
                                        )}

                                        {messages.map((msg, idx) => (
                                            <div key={idx} className={`message ${msg.role === 'assistant' ? 'artemis' : 'user'}`}>
                                                <div className="message-label">
                                                    {msg.role === 'assistant' ? 'ARTEMIS' : 'YOU'}
                                                </div>
                                                <div className="message-content">
                                                    {msg.content}
                                                </div>
                                            </div>
                                        ))}
                                        {isLoading && (
                                            <div className="loading">
                                                <div className="loading-spinner"></div>
                                                Artemis is thinking...
                                            </div>
                                        )}
                                    </div>

                                    <div className="input-container">
                                        <div className="input-wrapper">
                                            <textarea
                                                ref={inputRef}
                                                className="input-box"
                                                placeholder="Share what's on your mind..."
                                                value={inputValue}
                                                onChange={(e) => setInputValue(e.target.value)}
                                                onKeyPress={handleKeyPress}
                                                disabled={isLoading}
                                            />
                                            <div className="input-actions">
                                                {messages.length > 2 && (
                                                    <button 
                                                        className="btn btn-secondary" 
                                                        onClick={openLogModal}
                                                        disabled={currentSession?.logged}
                                                    >
                                                        {currentSession?.logged ? 'Logged ✓' : 'Log This'}
                                                    </button>
                                                )}
                                                <button 
                                                    className="btn btn-primary" 
                                                    onClick={handleSend}
                                                    disabled={!inputValue.trim() || isLoading}
                                                >
                                                    Send
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                    )}

                    {activeTab === 'focus' && <FocusTracker />}
                </>
            );
        }

        function FocusTracker() {
            const [sessions, setSessions] = useState([]);
            const [activeSession, setActiveSession] = useState(null);
            const [commitment, setCommitment] = useState('');
            const [duration, setDuration] = useState(null);
            const [elapsedTime, setElapsedTime] = useState(0);
            const [view, setView] = useState('active');

            // Load sessions from localStorage on mount
            useEffect(() => {
                const saved = localStorage.getItem('focusSessions');
                if (saved) {
                    setSessions(JSON.parse(saved));
                }
                const active = localStorage.getItem('activeSession');
                if (active) {
                    setActiveSession(JSON.parse(active));
                }
            }, []);

            // Save sessions to localStorage
            useEffect(() => {
                if (sessions.length > 0) {
                    localStorage.setItem('focusSessions', JSON.stringify(sessions));
                }
            }, [sessions]);

            // Timer for active session
            useEffect(() => {
                if (!activeSession) return;
                
                const interval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - activeSession.startTime) / 1000);
                    setElapsedTime(elapsed);
                }, 1000);

                return () => clearInterval(interval);
            }, [activeSession]);

            const startSession = () => {
                if (!commitment.trim()) return;
                
                const session = {
                    id: Date.now(),
                    commitment: commitment.trim(),
                    duration,
                    startTime: Date.now(),
                    checkIns: [],
                    outcome: null
                };
                
                setActiveSession(session);
                localStorage.setItem('activeSession', JSON.stringify(session));
                setCommitment('');
                setDuration(null);
                setView('active');
            };

            const addCheckIn = (status, note = '') => {
                const updated = {
                    ...activeSession,
                    checkIns: [
                        ...activeSession.checkIns,
                        { time: Date.now(), status, note }
                    ]
                };
                setActiveSession(updated);
                localStorage.setItem('activeSession', JSON.stringify(updated));
            };

            const endSession = (rating, notes = '') => {
                const completed = {
                    ...activeSession,
                    endTime: Date.now(),
                    outcome: { rating, notes }
                };
                
                setSessions([completed, ...sessions]);
                setActiveSession(null);
                localStorage.removeItem('activeSession');
                setElapsedTime(0);
                setView('history');
            };

            const formatTime = (seconds) => {
                const hrs = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                
                if (hrs > 0) {
                    return `${hrs}h ${mins}m ${secs}s`;
                } else if (mins > 0) {
                    return `${mins}m ${secs}s`;
                }
                return `${secs}s`;
            };

            const formatDuration = (ms) => {
                const mins = Math.floor(ms / 60000);
                if (mins < 60) return `${mins}m`;
                const hrs = Math.floor(mins / 60);
                const remainMins = mins % 60;
                return `${hrs}h ${remainMins}m`;
            };

            const getPatterns = () => {
                const commitmentMap = {};
                sessions.forEach(s => {
                    const key = s.commitment.toLowerCase();
                    if (!commitmentMap[key]) {
                        commitmentMap[key] = { count: 0, completed: 0 };
                    }
                    commitmentMap[key].count++;
                    if (s.outcome?.rating >= 4) commitmentMap[key].completed++;
                });
                return commitmentMap;
            };

            const patterns = getPatterns();
            const avoidancePatterns = Object.entries(patterns)
                .filter(([_, data]) => data.count >= 3 && data.completed === 0)
                .map(([commitment]) => commitment);

            return (
                <div className="focus-container">
                    <div className="focus-tabs">
                        <button
                            onClick={() => setView('active')}
                            className={`focus-tab ${view === 'active' ? 'active' : ''}`}
                        >
                            {activeSession ? 'Active session' : 'Start session'}
                        </button>
                        <button
                            onClick={() => setView('history')}
                            className={`focus-tab ${view === 'history' ? 'active' : ''}`}
                        >
                            History {sessions.length > 0 && `(${sessions.length})`}
                        </button>
                    </div>

                    {view === 'active' && !activeSession && (
                        <div>
                            <div style={{ marginBottom: '1.5rem' }}>
                                <label style={{ display: 'block', fontSize: '14px', fontWeight: 500, marginBottom: '8px' }}>
                                    What are you working on right now?
                                </label>
                                <input
                                    type="text"
                                    className="focus-input"
                                    value={commitment}
                                    onChange={(e) => setCommitment(e.target.value)}
                                    placeholder="e.g., Building payment flow for app"
                                    onKeyPress={(e) => e.key === 'Enter' && startSession()}
                                />
                            </div>

                            <div style={{ marginBottom: '1.5rem' }}>
                                <label style={{ display: 'block', fontSize: '14px', fontWeight: 500, marginBottom: '8px' }}>
                                    How long? (optional)
                                </label>
                                <div className="duration-buttons">
                                    {[
                                        { label: 'Quick task', mins: 30 },
                                        { label: 'Deep work', mins: 90 },
                                        { label: 'Until done', mins: null }
                                    ].map(opt => (
                                        <button
                                            key={opt.label}
                                            className={`duration-btn ${duration === opt.mins ? 'selected' : ''}`}
                                            onClick={() => setDuration(opt.mins)}
                                        >
                                            <div>{opt.label}</div>
                                            <div style={{ fontSize: '12px', color: '#888', marginTop: '4px' }}>
                                                {opt.mins ? `${opt.mins}m` : '∞'}
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <button 
                                className="start-btn" 
                                onClick={startSession}
                                disabled={!commitment.trim()}
                            >
                                Start Session
                            </button>
                        </div>
                    )}

                    {view === 'active' && activeSession && (
                        <div>
                            <div className="active-session-box">
                                <div className="commitment-label">Your commitment</div>
                                <div className="commitment-text">{activeSession.commitment}</div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <div className="timer-display">{formatTime(elapsedTime)}</div>
                                    {activeSession.duration && (
                                        <div style={{ fontSize: '13px', color: '#60a5fa' }}>
                                            Target: {activeSession.duration}m
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div style={{ marginBottom: '1.5rem' }}>
                                <label style={{ display: 'block', fontSize: '14px', fontWeight: 500, marginBottom: '8px' }}>
                                    Quick check-in
                                </label>
                                <div className="checkin-buttons">
                                    <button
                                        onClick={() => addCheckIn('focused')}
                                        className="checkin-btn focused"
                                    >
                                        ✓ Still focused
                                    </button>
                                    <button
                                        onClick={() => {
                                            const note = prompt('What pulled you away?');
                                            if (note !== null) addCheckIn('distracted', note);
                                        }}
                                        className="checkin-btn distracted"
                                    >
                                        ⚠ Got distracted
                                    </button>
                                </div>
                            </div>

                            {activeSession.checkIns.length > 0 && (
                                <div style={{ marginBottom: '1.5rem', fontSize: '13px' }}>
                                    <div style={{ color: '#888', marginBottom: '8px' }}>
                                        Check-ins: {activeSession.checkIns.length}
                                    </div>
                                    {activeSession.checkIns.slice(-3).map((checkIn, i) => (
                                        <div key={i} style={{ padding: '6px 0', borderTop: '1px solid #222' }}>
                                            <span style={{ 
                                                color: checkIn.status === 'focused' ? '#4ade80' : '#facc15',
                                                marginRight: '8px'
                                            }}>
                                                {checkIn.status === 'focused' ? '✓ Focused' : '⚠ Distracted'}
                                            </span>
                                            {checkIn.note && <span style={{ color: '#888' }}>— {checkIn.note}</span>}
                                        </div>
                                    ))}
                                </div>
                            )}

                            <div style={{ marginTop: '2rem' }}>
                                <label style={{ display: 'block', fontSize: '14px', fontWeight: 500, marginBottom: '8px' }}>
                                    How did it go?
                                </label>
                                <div className="rating-buttons">
                                    {[1, 2, 3, 4, 5].map(rating => (
                                        <button
                                            key={rating}
                                            onClick={() => {
                                                const notes = prompt('Any notes? (optional)');
                                                endSession(rating, notes || '');
                                            }}
                                            className="rating-btn"
                                        >
                                            <div style={{ fontSize: '18px', marginBottom: '4px' }}>
                                                {rating === 1 ? '😞' : rating === 2 ? '😕' : rating === 3 ? '😐' : rating === 4 ? '🙂' : '😊'}
                                            </div>
                                            <div style={{ fontSize: '11px', color: '#888' }}>{rating}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'history' && (
                        <div>
                            {avoidancePatterns.length > 0 && (
                                <div className="avoidance-warning">
                                    <div className="warning-title">⚠ Avoidance pattern detected</div>
                                    <div className="warning-text">
                                        You've started "{avoidancePatterns[0]}" {patterns[avoidancePatterns[0]].count} times but never finished with a high rating.
                                    </div>
                                </div>
                            )}

                            {sessions.length === 0 ? (
                                <div className="empty-state">
                                    <div style={{ fontSize: '48px', marginBottom: '1rem' }}>⏱️</div>
                                    <p>No sessions yet. Start your first commitment!</p>
                                </div>
                            ) : (
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                    {sessions.map(session => {
                                        const sessionDuration = session.endTime - session.startTime;
                                        const focusedCheckins = session.checkIns.filter(c => c.status === 'focused').length;
                                        const distractedCheckins = session.checkIns.filter(c => c.status === 'distracted').length;
                                        
                                        return (
                                            <div key={session.id} className="session-card">
                                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '8px' }}>
                                                    <div style={{ flex: 1 }}>
                                                        <div style={{ fontSize: '15px', fontWeight: 500, marginBottom: '4px' }}>
                                                            {session.commitment}
                                                        </div>
                                                        <div style={{ fontSize: '13px', color: '#888' }}>
                                                            {new Date(session.startTime).toLocaleDateString('en-US', { 
                                                                month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' 
                                                            })}
                                                            {' · '}
                                                            {formatDuration(sessionDuration)}
                                                        </div>
                                                    </div>
                                                    <div style={{ fontSize: '20px' }}>
                                                        {session.outcome?.rating === 1 ? '😞' : 
                                                         session.outcome?.rating === 2 ? '😕' : 
                                                         session.outcome?.rating === 3 ? '😐' : 
                                                         session.outcome?.rating === 4 ? '🙂' : 
                                                         session.outcome?.rating === 5 ? '😊' : '—'}
                                                    </div>
                                                </div>
                                                
                                                {(focusedCheckins > 0 || distractedCheckins > 0) && (
                                                    <div style={{ fontSize: '12px', color: '#888', marginTop: '8px', paddingTop: '8px', borderTop: '1px solid #222' }}>
                                                        {focusedCheckins > 0 && <span style={{ marginRight: '12px' }}>✓ {focusedCheckins} focused</span>}
                                                        {distractedCheckins > 0 && <span>⚠ {distractedCheckins} distracted</span>}
                                                    </div>
                                                )}
                                                
                                                {session.outcome?.notes && (
                                                    <div style={{ fontSize: '13px', color: '#888', marginTop: '8px', fontStyle: 'italic' }}>
                                                        "{session.outcome.notes}"
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<ArtemisApp />, document.getElementById('root'));
    </script>
</body>
</html>
