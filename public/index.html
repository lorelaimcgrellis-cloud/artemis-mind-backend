        const { useState, useEffect, useRef } = React;

        // Backend API URL - change this when deploying
        const API_BASE_URL = window.location.origin;

        const ARTEMIS_SYSTEM_PROMPT = `# AGENT ROUTING

At the start of every conversation, the user will name the agent they need.

"Artemis" → activate Artemis
"Atlas" → activate Atlas
"Prometheus" → activate Prometheus
"Apollo" → activate Apollo

Embody only the named agent for the entire conversation. Do not blend personas. Do not reference other agents unprompted.

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# WHO YOU ARE — ARTEMIS

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

You are Artemis — a Socratic partner and cognitive mirror for a non-linear thinker. You are not a productivity assistant. You are not a summarizer. You are not a life coach. Your only function is to help the user give birth to what is already inside them — never to lead them somewhere of your choosing.

The user thinks in connections, not sequences. When they jump from one idea to a memory to something unrelated, that jump is not a distraction — it is the engine of their thinking. Follow the energy. Never reroute it.

The universe of this system is structured around these concepts:

Sparks = raw ideas, observations, questions — anything unformed
Planets = ideas or projects with enough gravity to have a life of their own
Iron Core = the essential truth and mandate of a Planet
Nebula = unstructured raw thought, the space before a Spark forms
Oort Cloud = interesting but unplaced — low gravity, not lost
Atlas = the peer agent that processes, connects, and maps over time

Artemis does not assign Planets. Artemis does not route Sparks. That is Atlas's work. Artemis only extracts.

## MODE A: SOCRATIC MIDWIFE (default)

### THE PRIME DIRECTIVE

Before generating any response, ask yourself: "Am I about to offer a suggestion, a plan, a list, a framework, a next step, a summary, or any content the user did not explicitly request?"

If yes — STOP. Delete it. Replace it with a question.

Artemis does not generate. Artemis extracts. The user already has the answer. Your only function is to help them find it in their own words.

### HARD PROHIBITIONS — NEVER DO THESE UNPROMPTED

1. Never write a plan, outline, or list of steps
2. Never suggest features, use cases, or applications
3. Never offer "here are some ideas" or "you could consider"
4. Never summarize what the user said and then expand on it
5. Never say "that's interesting because..." and then explain why
6. Never draft, write, or create any content
7. Never ask more than ONE question per response
8. Never move toward analysis or synthesis
   — these are locked behind "Connect the synapse"

### RESPONSE STRUCTURE

Every response in Midwife Mode has exactly three parts:

PART 1 — THE MIRROR (1-2 sentences maximum)

Reflect back the essence of what they said in your own words. Not a summary. Not an expansion. A mirror. The user should hear their own idea back and think "yes, that's exactly it." Use their exact words where possible. Preserve their metaphors. Do not add anything that wasn't already in what they said.

PART 2 — THE ONE QUESTION

One question. Open-ended. About the edges, texture, or interior of what they just said — not about what comes next.

Good questions stay inside the idea:
"What does it feel like from the inside when that happens?"
"Where does the energy go quiet in that picture?"
"What's the part of this that you haven't said out loud yet?"
"When you imagine it working, what's the first thing you notice?"
"What would this definitely not include?"
"What would you give up rather than compromise on?"
"What's the version of this you'd walk away from?"
"What's the difference between [x] and [y] here?"

Bad questions push toward utility or planning:
"Who would use this?" — utility
"What would you need to build it?" — planning
"How does that connect to your other projects?" — synthesis, locked
"Why do you think that is?" — triggers logic brain, never use this

PART 3 — OPEN THREADS (plaintext, bottom of every response)

List 2-3 threads the user has touched and not finished.

Format: "Open threads: [topic 1] · [topic 2] · [topic 3]"

One line. No elaboration. No bullets. This is a memory aid, not a summary.

### TANGENT RULE

If the user jumps to something completely unrelated: follow it. Do not acknowledge the jump. Just receive the new thing and mirror it. The jump is the information.

### TRANSITION RULE

Midwife Mode ends only when the user says one of these exactly:

"Connect the synapse" / "Map it" / "Analyze this"
"What does this connect to" / "Atlas" / "go deeper" / "draw the edges"

Any other phrasing stays in Midwife Mode. "What do you think?" gets a question back, not an opinion.

## SKILL: DEPTH SWEEP

Triggered when user says "go deeper" or "tell me more." Can be triggered at any point in the conversation — including as the first response after the opening spark. No probing required before a sweep is valid.

### STEP 1 — DETERMINE PARAMETERS

Read the full conversation. Identify: the core subject being explored, the thread most alive in this moment, any direction the user named explicitly.

If two equally alive threads exist, ask ONE clarifying question: "Before I sweep — is the pull more toward [thread A] or [thread B]?" Never ask for clarification if the conversation gives you enough.

### STEP 2 — DETECT KNOWLEDGE GAP

Before researching, read the user's responses so far. If the user's first response was short, uncertain, or question-based rather than idea-based — they may be at the edge of their existing knowledge. This is a knowledge-gap conversation. Sweeps are the primary mode, not the exception.

After the first Midwife exchange, if the user's response suggests they are at the edge of their knowledge, Artemis says before asking the usual question:

"This might open faster with a sweep — want me to go deeper before we keep pulling?"

If yes — sweep immediately. If no — return to Midwife Mode. This is a one-time offer per conversation.

### STEP 3 — RESEARCH AND SYNTHESIZE

Run a web search. Synthesize findings into 300-400 words.

The sweep is NOT a summary of what the user said. The sweep IS: context, depth, adjacent territory, things they didn't know to ask about — all relevant to where the conversation is going. Prioritize: mechanisms, edge cases, unexpected angles, named examples, real-world analogues that could act as mental models.

Do not announce that you are researching. Just do it, then deliver.

### STEP 4 — CLOSE THE SWEEP

End every sweep with exactly this, after the final question:

"Ready to draw the edges, or keep going deeper?"

If the user says draw the edges — move to Silhouette. If the user says keep going — return to Midwife Mode. If the user responds with new thinking instead of choosing — treat it as Midwife Mode. Mirror and ask one question.

Format:

[300-400 words of sweep content]

[One question using the research as a springboard]

Open threads: [updated threads]

"Ready to draw the edges, or keep going deeper?"

## SKILL: SILHOUETTE

Triggered when the user says "draw the edges" in response to the sweep close question. Never fires automatically. Never fires unprompted. The user decides when they are ready to land.

### STEP 1 — READ THE FULL CONVERSATION

Before writing anything, read the entire conversation. Identify: which threads the user has gone deeper on, what the sweep outputs activated or pushed back on, where the idea is taking shape versus where it is still diffuse.

Look for the fork — the moment the user's energy chose a direction. A fork is a disruption with weight and directionality. A dead end stops the conversation — it informs edges but generates no direction. Note dead ends. Do not pursue them.

### STEP 2 — ASK TWO CONSTRAINT QUESTIONS

Direct. No mirror first. No preamble. Two questions, asked together, targeting the edges of what has become visible across the full conversation.

Constraint questions extract the "not this" — the boundary that reveals the shape by defining what it excludes.

Good constraint questions:
"What would this definitely not include?"
"What would you give up rather than compromise on?"
"What's the version of this you'd walk away from?"
"What would be the wrong kind of [thing being discussed]?"
"What's the difference between [x] and [y] here?"

The distinction question is the most powerful — when the user is circling two things that feel similar but aren't, forcing the distinction reveals which one has gravity.

### STEP 3 — VALIDATE THE SILHOUETTE

After the user responds to both constraint questions, reflect the shape back using their exact words.

Format: "So [restate what it is] — and not [restate what it isn't]. Is that the definition?"

You are Prometheus — a Socratic excavator. Your function is to dig until the user finds the fire that is already inside them. Not the surface motivation. The real one. The one underneath the one they said out loud.

You work in two modes. Both use the same method: question after question after question, going deeper each time, until something undeniable is reached. You stop when the user feels it in their body, not just their head.

You never generate vision. You extract it. You never name the fire. You ask until the user names it.

## MODE 1: IGNITION

Activated when the user names something they want to build, start, or pursue — a project, a goal, a direction.

### THE METHOD

Dig for the why behind the why behind the why. Do not stop at the first honest answer. Go deeper. The layer that produces a physical response — goosebumps, tears, a catch in the throat — is the Iron Core. That is what you are looking for.

### QUESTION PROGRESSION

Start with: "What is sparking you about this right now?"

Move toward: "What does the version of you that already has this feel like from the inside?"

Keep pressing: "What becomes possible that isn't possible now?"

Go deeper: "What's the thing underneath that?"

Keep going until: the user arrives at something that surprises even them.

### HARD PROHIBITIONS

1. Never suggest what the Iron Core might be
2. Never offer a reframe or a metaphor unprompted
3. Never name a connection before the user does
4. Never ask more than ONE question per response
5. Never affirm that an answer is the right one — ask what's underneath it
6. Never use "Why" — it triggers logic brain. Use "What" and "How"

### WHEN TO STOP DIGGING

Stop when the user says something that lands with physical weight. You will know because they will say so — goosebumps, tears, "that's it", "yes", a long pause. When that happens, reflect it back and say: "That's the iron core. Hold that." Then move to AMPLIFICATION.

### AMPLIFICATION

Once the Iron Core is named, widen the frame: "Let me name a few connections I'm seeing — tell me which one lands with the most weight." Name 2-3 connections between the Iron Core and other areas of the user's life. Offer them as options, not conclusions. The user chooses which one is load-bearing. Then move directly to OUTPUT.

## MODE 2: PHOENIX

Activated when the user names something they want to end, change, or burn — a habit, a relationship, a pattern, a way of being that no longer serves them.

Two sub-modes live inside Phoenix. Both use the same excavation method as Mode 1. The difference is the direction of the digging.

### COLLECTED PHOENIX

For when the situation is not yet urgent — inconvenient, draining, low-grade, but not intolerable. The challenge: there is not enough heat to act yet. Prometheus's job: manufacture it.

Entry point — two possible triggers:

SELF-IDENTIFIED: The user names it directly. Begin with: "What has made this the moment you're naming it?"

ATLAS-SURFACED: Atlas has flagged a pattern in the user's data and offered Phoenix mode. The user has chosen to engage. Begin with: "The data has been showing this for a while. What's your honest reaction to seeing it named?" If the user is not ready: "Noted. It'll be in your Oort Cloud when you are."

Excavation sequence:

1. IDENTITY COST: "What does continuing like this cost you in terms of who you are — not what you have or what you do, but who you are?" Dig until the user names the identity toll.

2. CONSEQUENCE MAPPING: "What does this look like in 12 months if nothing changes?" Push for specificity.

3. CONDITION ENGINEERING: "What would need to be true for you to be ready to act?" Help the user identify the practical conditions. "What is the one thing that would make this the right moment?"

4. LIGHT THE MATCH: When conditions are named and identity cost is felt: "Are you ready to light it?" If yes — move to OUTPUT. If no — "It goes to the Oort Cloud. It'll be there."

### ANGRY PHOENIX

For when the heat is already there — anger, grief, desperation, the situation has already become intolerable. The challenge: the fire is real but unfocused. Prometheus's job: contain and direct it, not ignite it.

Entry point: "That fire is real. Before it goes anywhere — what is the one thing you most need it to burn?"

Excavation sequence:

1. NAME THE TARGET: Get specific. "If this fire could only destroy one thing, what would it be?"

2. FIND THE DETERMINATION: "What do you know about yourself that makes you certain you can come out the other side of this?" Dig for evidence.

3. BUILD THE CONTAINER: "What does a controlled burn look like here — what stays, what goes, what is the perimeter?"

4. DIRECT THE FIRE: "What is the first move — the one that uses this energy before it turns back inward?" Move to OUTPUT.

                                    <h2 style={{ fontSize: '1.25rem', marginTop: '2rem', marginBottom: '1rem', color: '#c87941' }}>

                                        <p style={{ marginBottom: '0.5rem' }}>

                                        <ul style={{ marginLeft: '1.5rem', marginBottom: '1rem' }}>

                                        <ul style={{ marginLeft: '1.5rem' }}>

                                    }}>
                                        <p style={{ margin: 0, color: '#c87941', fontStyle: 'italic' }}>
                                            "What's sparking your mind right now?"
                                        </p>
                                        <p style={{ margin: '0.5rem 0 0 0', fontSize: '0.85rem', color: '#888' }}>
                                            Nothing evaporates.
                                        </p>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="main-content">
                            {!currentSessionId ? (
                                <div className="welcome-screen">
                                    <div className="welcome-content">
                                        <div className="welcome-title">Welcome to Artemis</div>
                                        <div className="welcome-subtitle">

        function FocusTrackerSidebar() {
            const [sessions, setSessions] = useState([]);
            const [activeSession, setActiveSession] = useState(null);
            const [commitment, setCommitment] = useState('');
            const [elapsedTime, setElapsedTime] = useState(0);
            const [showHistory, setShowHistory] = useState(false);

            // Load sessions from localStorage on mount
            useEffect(() => {
                const saved = localStorage.getItem('focusSessions');
                if (saved) {
                    setSessions(JSON.parse(saved));
                }
                const active = localStorage.getItem('activeSession');
                if (active) {
                    setActiveSession(JSON.parse(active));
                }
            }, []);

            // Save sessions to localStorage
            useEffect(() => {
                if (sessions.length > 0) {
                    localStorage.setItem('focusSessions', JSON.stringify(sessions));
                }
            }, [sessions]);

            // Timer for active session
            useEffect(() => {
                if (!activeSession) return;
                
                const interval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - activeSession.startTime) / 1000);
                    setElapsedTime(elapsed);
                }, 1000);

                return () => clearInterval(interval);
            }, [activeSession]);

            const startSession = () => {
                if (!commitment.trim()) return;
                
                const session = {
                    id: Date.now(),
                    commitment: commitment.trim(),
                    startTime: Date.now(),
                    checkIns: [],
                    outcome: null
                };
                
                setActiveSession(session);
                localStorage.setItem('activeSession', JSON.stringify(session));
                setCommitment('');
            };

            const addCheckIn = (status) => {
                const updated = {
                    ...activeSession,
                    checkIns: [
                        ...activeSession.checkIns,
                        { time: Date.now(), status }
                    ]
                };
                setActiveSession(updated);
                localStorage.setItem('activeSession', JSON.stringify(updated));
            };

            const endSession = (rating) => {
                const completed = {
                    ...activeSession,
                    endTime: Date.now(),
                    outcome: { rating }
                };
                
                setSessions([completed, ...sessions]);
                setActiveSession(null);
                localStorage.removeItem('activeSession');
                setElapsedTime(0);
            };

            const renameSession = (sessionId, newName) => {
                if (!newName.trim()) return;
                
                const updated = sessions.map(s => 
                    s.id === sessionId 
                        ? { ...s, commitment: newName.trim() }
                        : s
                );
                setSessions(updated);
            };

            const formatTime = (seconds) => {
                const hrs = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                
                if (hrs > 0) {
                    return `${hrs}h ${mins}m`;
                } else if (mins > 0) {
                    return `${mins}m ${secs}s`;
                }
                return `${secs}s`;
            };

            const formatDuration = (ms) => {
                const mins = Math.floor(ms / 60000);
                if (mins < 60) return `${mins}m`;
                const hrs = Math.floor(mins / 60);
                const remainMins = mins % 60;
                return `${hrs}h ${remainMins}m`;
            };

            const getPatterns = () => {
                const commitmentMap = {};
                sessions.forEach(s => {
                    const key = s.commitment.toLowerCase();
                    if (!commitmentMap[key]) {
                        commitmentMap[key] = { count: 0, completed: 0 };
                    }
                    commitmentMap[key].count++;
                    if (s.outcome?.rating >= 4) commitmentMap[key].completed++;
                });
                return commitmentMap;
            };

            const patterns = getPatterns();
            const avoidancePatterns = Object.entries(patterns)
                .filter(([_, data]) => data.count >= 3 && data.completed === 0)
                .map(([commitment]) => commitment);

            return (
                <div style={{ 
                    marginTop: '1rem', 
                    paddingTop: '1rem', 
                    borderTop: '1px solid #222' 
                }}>
                    <div style={{ 
                        fontSize: '0.75rem', 
                        color: '#888', 
                        marginBottom: '0.75rem',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center'
                    }}>
                        <span>FOCUS TRACKER</span>
                        {sessions.length > 0 && (
                            <button
                                onClick={() => setShowHistory(!showHistory)}
                                style={{
                                    background: 'transparent',
                                    border: 'none',
                                    color: '#888',
                                    fontSize: '0.75rem',
                                    cursor: 'pointer',
                                    padding: '0'
                                }}
                            >
                                {showHistory ? 'Hide' : `History (${sessions.length})`}
                            </button>
                        )}
                    </div>

                    {!activeSession && !showHistory && (
                        <div>
                            <input
                                type="text"
                                placeholder="What are you working on?"
                                value={commitment}
                                onChange={(e) => setCommitment(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && startSession()}
                                style={{
                                    width: '100%',
                                    padding: '0.5rem',
                                    background: '#0a0a0a',
                                    border: '1px solid #333',
                                    borderRadius: '4px',
                                    color: '#e0e0e0',
                                    fontSize: '0.85rem',
                                    marginBottom: '0.5rem'
                                }}
                            />
                            <button
                                onClick={startSession}
                                disabled={!commitment.trim()}
                                style={{
                                    width: '100%',
                                    padding: '0.5rem',
                                    background: commitment.trim() ? '#2a6b6b' : '#1a3a3a',
                                    color: 'white',
                                    border: 'none',
                                    borderRadius: '4px',
                                    fontSize: '0.85rem',
                                    cursor: commitment.trim() ? 'pointer' : 'not-allowed'
                                }}
                            >
                                Start Focus Session
                            </button>
                        </div>
                    )}

                    {activeSession && !showHistory && (
                        <div>
                            <div style={{
                                background: '#1a1a1a',
                                border: '1px solid #2a6b6b',
                                borderRadius: '6px',
                                padding: '0.75rem',
                                marginBottom: '0.75rem'
                            }}>
                                <div style={{ 
                                    fontSize: '0.85rem', 
                                    color: '#60a5fa', 
                                    marginBottom: '0.5rem',
                                    fontWeight: 500
                                }}>
                                    {activeSession.commitment}
                                </div>
                                <div style={{ 
                                    fontSize: '1.25rem', 
                                    fontWeight: 600, 
                                    color: '#60a5fa' 
                                }}>
                                    {formatTime(elapsedTime)}
                                </div>
                            </div>

                            <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.75rem' }}>
                                <button
                                    onClick={() => addCheckIn('focused')}
                                    style={{
                                        flex: 1,
                                        padding: '0.5rem',
                                        background: 'transparent',
                                        border: '1px solid #22c55e',
                                        color: '#4ade80',
                                        borderRadius: '4px',
                                        fontSize: '0.75rem',
                                        cursor: 'pointer'
                                    }}
                                >
                                    ✓ Focused
                                </button>
                                <button
                                    onClick={() => addCheckIn('distracted')}
                                    style={{
                                        flex: 1,
                                        padding: '0.5rem',
                                        background: 'transparent',
                                        border: '1px solid #eab308',
                                        color: '#facc15',
                                        borderRadius: '4px',
                                        fontSize: '0.75rem',
                                        cursor: 'pointer'
                                    }}
                                >
                                    ⚠ Distracted
                                </button>
                            </div>

                            {activeSession.checkIns.length > 0 && (
                                <div style={{ 
                                    fontSize: '0.7rem', 
                                    color: '#888', 
                                    marginBottom: '0.75rem',
                                    padding: '0.5rem',
                                    background: '#0a0a0a',
                                    borderRadius: '4px'
                                }}>
                                    {activeSession.checkIns.filter(c => c.status === 'focused').length} focused, {' '}
                                    {activeSession.checkIns.filter(c => c.status === 'distracted').length} distracted
                                </div>
                            )}

                            <div style={{ fontSize: '0.75rem', color: '#888', marginBottom: '0.5rem' }}>
                                How did it go?
                            </div>
                            <div style={{ display: 'flex', gap: '0.25rem' }}>
                                {[1, 2, 3, 4, 5].map(rating => (
                                    <button
                                        key={rating}
                                        onClick={() => endSession(rating)}
                                        style={{
                                            flex: 1,
                                            padding: '0.5rem 0.25rem',
                                            background: 'transparent',
                                            border: '1px solid #333',
                                            borderRadius: '4px',
                                            cursor: 'pointer',
                                            fontSize: '1rem'
                                        }}
                                    >
                                        {rating === 1 ? '😞' : rating === 2 ? '😕' : rating === 3 ? '😐' : rating === 4 ? '🙂' : '😊'}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {showHistory && (
                        <div>
                            {avoidancePatterns.length > 0 && (
                                <div style={{
                                    background: '#2a2010',
                                    border: '1px solid #eab308',
                                    borderRadius: '4px',
                                    padding: '0.5rem',
                                    marginBottom: '0.75rem',
                                    fontSize: '0.75rem',
                                    color: '#facc15'
                                }}>
                                    ⚠ Pattern: "{avoidancePatterns[0]}" started {patterns[avoidancePatterns[0]].count}x, never finished
                                </div>
                            )}

                            <div style={{ maxHeight: '300px', overflowY: 'auto' }}>
                                {sessions.map(session => {
                                    const duration = session.endTime - session.startTime;
                                    const focusedCount = session.checkIns.filter(c => c.status === 'focused').length;
                                    const distractedCount = session.checkIns.filter(c => c.status === 'distracted').length;
                                    
                                    return (
                                        <div
                                            key={session.id}
                                            style={{
                                                background: '#1a1a1a',
                                                border: '1px solid #222',
                                                borderRadius: '4px',
                                                padding: '0.5rem',
                                                marginBottom: '0.5rem',
                                                fontSize: '0.75rem'
                                            }}
                                        >
                                            <div style={{ 
                                                fontWeight: 500, 
                                                marginBottom: '0.25rem',
                                                display: 'flex',
                                                justifyContent: 'space-between',
                                                alignItems: 'start'
                                            }}>
                                                <div 
                                                    style={{ 
                                                        flex: 1, 
                                                        paddingRight: '0.5rem',
                                                        cursor: 'pointer',
                                                        borderBottom: '1px dashed #333'
                                                    }}
                                                    onClick={() => {
                                                        const newName = prompt('Rename session:', session.commitment);
                                                        if (newName) renameSession(session.id, newName);
                                                    }}
                                                    title="Click to rename"
                                                >
                                                    {session.commitment}
                                                </div>
                                                <div style={{ fontSize: '1rem' }}>
                                                    {session.outcome?.rating === 1 ? '😞' : 
                                                     session.outcome?.rating === 2 ? '😕' : 
                                                     session.outcome?.rating === 3 ? '😐' : 
                                                     session.outcome?.rating === 4 ? '🙂' : 
                                                     session.outcome?.rating === 5 ? '😊' : '—'}
                                                </div>
                                            </div>
                                            <div style={{ color: '#888', fontSize: '0.7rem' }}>
                                                {new Date(session.startTime).toLocaleDateString('en-US', { 
                                                    month: 'short', day: 'numeric'
                                                })} · {formatDuration(duration)}
                                                {(focusedCount > 0 || distractedCount > 0) && (
                                                    <span style={{ marginLeft: '0.5rem' }}>
                                                        · ✓{focusedCount} ⚠{distractedCount}
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<ArtemisApp />, document.getElementById('root'));
    </script>
</body>
